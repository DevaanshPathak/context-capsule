<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Context Capsule</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <header>
      <div>
        <h1>Context Capsule</h1>
        <p id="status" role="status">Loading...</p>
      </div>
      <div class="header-actions">
        <button id="settings" class="icon-button" type="button" title="Open settings" aria-label="Open settings">Settings</button>
        <button id="refresh" class="icon-button" type="button" title="Refresh history" aria-label="Refresh history">Refresh</button>
      </div>
    </header>

    <main>
      <section id="onboarding" class="onboarding-card" hidden>
        <div>
          <h2>Quick Start</h2>
          <p>Capture with Ctrl+Shift+C. Open this dashboard with Ctrl+Shift+H. Run python install.py --doctor if native messaging fails.</p>
        </div>
        <div class="onboarding-actions">
          <button id="open-demo" type="button">Demo</button>
          <button id="dismiss-onboarding" type="button">Dismiss</button>
        </div>
      </section>

      <section class="stats-grid" aria-label="History summary">
        <article>
          <strong id="stat-total">0</strong>
          <span>Total</span>
        </article>
        <article>
          <strong id="stat-pinned">0</strong>
          <span>Pinned</span>
        </article>
        <article>
          <strong id="stat-fallback">0</strong>
          <span>Fallbacks</span>
        </article>
      </section>

      <section class="capture-panel" aria-label="Capture controls">
        <button id="capture" class="primary-button" type="button">Capture Current Page</button>
        <label class="format-control" for="capture-mode">
          <span>Mode</span>
          <select id="capture-mode">
            <option value="smart">Smart</option>
            <option value="selection">Selection</option>
            <option value="clipboard">Clipboard</option>
            <option value="metadata">Page only</option>
            <option value="visible">Visible text</option>
            <option value="readable">Readable text</option>
          </select>
        </label>
        <label class="format-control" for="format-mode">
          <span>Format</span>
          <select id="format-mode">
            <option value="markdown">Markdown</option>
            <option value="compact">Compact</option>
            <option value="prompt">Prompt</option>
          </select>
        </label>
        <label class="format-control" for="template-id">
          <span>Template</span>
          <select id="template-id">
            <option value="none">None</option>
            <option value="summarize">Summarize</option>
            <option value="debug">Debug</option>
            <option value="explain">Explain docs</option>
            <option value="notes">Notes</option>
          </select>
        </label>
      </section>

      <section class="label-panel" aria-label="Capture labels">
        <label>
          <span>Project</span>
          <input id="project" type="text" maxlength="80" placeholder="research">
        </label>
        <label>
          <span>Tag</span>
          <input id="tag" type="text" maxlength="80" placeholder="debugging">
        </label>
      </section>

      <section id="last-result" class="last-result" aria-live="polite">
        <strong id="result-message">Ready.</strong>
        <span id="result-meta"></span>
      </section>

      <section id="latest-source" class="latest-source" hidden>
        <span>Latest source</span>
        <button id="open-latest" type="button">Open</button>
      </section>

      <section class="capsule-panel" aria-label="Active capsule">
        <div>
          <h2>Capsule</h2>
          <p id="capsule-status">No active capsule.</p>
        </div>
        <div class="capsule-actions">
          <button id="capsule-start" type="button">Start</button>
          <button id="capsule-append" type="button">Append Page</button>
          <button id="capsule-copy" type="button">Copy</button>
          <button id="capsule-clear" type="button">Clear</button>
        </div>
      </section>

      <section class="export-panel" aria-label="Export captures">
        <label for="export-format">
          <span>Export</span>
          <select id="export-format">
            <option value="markdown">Markdown</option>
            <option value="json">JSON</option>
          </select>
        </label>
        <button id="export-visible" type="button">Visible</button>
        <button id="export-all" type="button">All</button>
        <button id="export-capsule" type="button">Capsule</button>
        <button id="demo-prompt" type="button">Demo Prompt</button>
      </section>

      <section class="history-heading" aria-label="History controls">
        <h2>History</h2>
        <div class="history-actions">
          <button id="clear" type="button">Clear</button>
        </div>
      </section>

      <section class="history-tools" aria-label="History filters">
        <input id="search" type="search" placeholder="Search title, URL, or text">
        <input id="label-filter" type="search" placeholder="Filter project or tag">
        <div class="filter-row" role="group" aria-label="History filter">
          <button class="filter-button active" type="button" data-filter="all">All</button>
          <button class="filter-button" type="button" data-filter="pinned">Pinned</button>
          <button class="filter-button" type="button" data-filter="fallback">Fallback</button>
        </div>
      </section>

      <ol id="history" aria-label="Recent captures"></ol>

      <section class="diagnostics-panel" aria-label="Diagnostics">
        <div class="diagnostics-heading">
          <h2>Diagnostics</h2>
          <button id="refresh-diagnostics" type="button">Refresh</button>
        </div>
        <ul id="diagnostics"></ul>
      </section>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
